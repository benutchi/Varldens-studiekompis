<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studiehjälp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100">

  <header class="bg-blue-600 text-white py-8 px-4 text-center">
    <h1 class="text-4xl font-bold mb-2">Studiehjälp</h1>
    <p class="text-2xl italic">Världen, människan och makten</p>
  </header>

  <main class="max-w-4xl mx-auto p-6">
    <section class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-3xl font-bold mb-4">Analysera din fråga</h2>

      <div class="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6">
        <p class="text-lg">
          Klistra in <strong>en rad i taget</strong> från arbetsdokumentet.
        </p>
      </div>

      <textarea
        id="userQuestion"
        rows="4"
        class="w-full border-2 border-gray-200 rounded-xl p-4 text-xl mb-4"
        placeholder="Klistra in en rad här..."
      ></textarea>

      <button
        id="analyzeBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl text-xl mb-6"
      >
        Hjälp mig förstå raden
      </button>

      <div
        id="resultCard"
        class="hidden mt-6 space-y-4"
      >
        <div class="bg-blue-50 rounded-xl p-4 border-l-4 border-blue-500">
          <h3 class="text-2xl font-bold mb-2">Vad betyder raden?</h3>
          <p id="meaningText" class="text-lg"></p>
        </div>

        <div class="bg-green-50 rounded-xl p-4 border-l-4 border-green-500">
          <h3 class="text-2xl font-bold mb-2">Viktiga begrepp</h3>
          <ul id="conceptsList" class="list-disc pl-6 text-lg space-y-1"></ul>
        </div>

        <div class="bg-amber-50 rounded-xl p-4 border-l-4 border-amber-500">
          <h3 class="text-2xl font-bold mb-2">Vad ska du göra nu?</h3>
          <ul id="nextList" class="list-disc pl-6 text-lg space-y-1"></ul>
        </div>
      </div>
    </section>
  </main>

  <script>
    const HELP_DATA = [
      {
  patterns: [
    "vilken klimatzon ligger landet i?",
    "vilken klimatzon ligger landet i"
  ],
  meaning: "Frågan vill att du placerar landet i rätt klimatzon, alltså vilken typ av klimat området tillhör.",
  concepts: [
    "Klimatzon = områden på jorden med liknande klimat.",
    "Vanliga klimatzoner är tropisk, subtropisk, tempererad och polar.",
    "Klimatet påverkas av läge, avstånd till hav och höjd över havet."
  ],
  next: [
    "Steg 1: Ta reda på var landet ligger på jorden.",
    "Steg 2: Kolla om det är varmt året runt, kalla vintrar eller mycket nederbörd.",
    "Steg 3: Koppla det till en klimatzon (t.ex. tropisk eller tempererad).",
    "Steg 4: Skriv ett kort svar: 'Landet ligger i den ___ klimatzonen eftersom…'"
  ]
}
        patterns: [
          "endogena krafter: krafter från jordens inre (t.ex. vulkaner, jordbävningar och bergskedjebildning). ge exempel från ditt land (nu eller historiskt).",
          "endogena krafter: krafter från jordens inre (t.ex. vulkaner, jordbävningar och bergskedjebildning). ge exempel från ditt land",
          "endogena krafter"
        ],
        meaning: "Du ska förklara vad endogena krafter är och ge exempel från landet.",
        concepts: [
          "Endogena krafter är krafter från jordens inre.",
          "Exempel är jordbävningar, vulkaner och bergskedjebildning."
        ],
        next: [
          "Sök om landet har jordbävningar, vulkaner eller liknande.",
          "Välj ett tydligt exempel.",
          "Förklara hur det påverkar människor."
        ]
      },
      {
        patterns: [
          "exogena krafter: krafter som formar jordytan utifrån (t.ex. vind, vatten och erosion). ge exempel från ditt land.",
          "exogena krafter: krafter som formar jordytan utifrån (t.ex. vind, vatten och erosion). ge exempel från ditt land",
          "exogena krafter"
        ],
        meaning: "Du ska förklara vad exogena krafter är och ge exempel från landet.",
        concepts: [
          "Exogena krafter formar jordytan utifrån.",
          "Exempel är vind, vatten och erosion."
        ],
        next: [
          "Sök efter erosion, vind, vatten eller översvämningar i landet.",
          "Hitta ett tydligt exempel.",
          "Förklara hur naturen och människorna påverkas."
        ]
      }
    ];

    function normalizeText(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ");
    }

    function analyzeQuestion() {
      const input = normalizeText(document.getElementById("userQuestion").value);
      const resultCard = document.getElementById("resultCard");
      const meaningText = document.getElementById("meaningText");
      const conceptsList = document.getElementById("conceptsList");
      const nextList = document.getElementById("nextList");

      if (!input) {
        meaningText.textContent = "Du behöver klistra in en rad först.";
        conceptsList.innerHTML = "<li>Klistra in en rad från arbetsdokumentet.</li>";
        nextList.innerHTML = "<li>Testa igen med en hel rad.</li>";
        resultCard.classList.remove("hidden");
        return;
      }

      const match = HELP_DATA.find(item =>
        item.patterns.some(pattern => input === normalizeText(pattern))
      );

      if (!match) {
        meaningText.textContent = "Jag känner inte igen den här raden ännu.";
        conceptsList.innerHTML = "<li>Prova att klistra in exakt en rad från arbetsdokumentet.</li>";
        nextList.innerHTML = "<li>Testa igen med hela raden, inte bara ett ord.</li>";
        resultCard.classList.remove("hidden");
        return;
      }

      meaningText.textContent = match.meaning;
      conceptsList.innerHTML = match.concepts.map(item => `<li>${item}</li>`).join("");
      nextList.innerHTML = match.next.map(item => `<li>${item}</li>`).join("");
      resultCard.classList.remove("hidden");
    }

document.getElementById("analyzeBtn").addEventListener("click", analyzeQuestion);

document  .getElementById("userQuestion")
  .addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      analyzeQuestion();
    }
  });
  </script>

</body>
</html>
