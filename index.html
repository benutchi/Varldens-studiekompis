<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studiehjälp – Världen, människan och makten</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
    </style>
</head>

<body class="min-h-screen pb-12">

<header class="bg-blue-600 text-white py-8 px-4 text-center mb-8">
    <h1 class="text-3xl md:text-4xl font-bold mb-2">Studiehjälp</h1>
    <p class="text-xl opacity-90 italic">Världen, människan och makten</p>
</header>

<main class="max-w-3xl mx-auto px-4">

<section class="bg-white p-6 rounded-2xl card-shadow border border-gray-100">
    <h2 class="text-2xl font-semibold mb-4 text-gray-800">Analysera din fråga</h2>

    <div class="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6">
        <p class="text-gray-700 leading-relaxed">
            Klistra in en fråga från ditt <strong>arbetsdokument</strong>.
        </p>
    </div>

    <textarea 
        id="userQuestion" 
        rows="4" 
        placeholder="Klistra in frågan här..."
        class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none"
    ></textarea>

    <button onclick="analyzeQuestion()"
        class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors active:scale-[0.98]">
        Hjälp mig förstå frågan
    </button>

    <div id="errorMessage" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-lg text-center">
        Klistra in en fråga först.
    </div>

    <div id="resultCard" class="hidden mt-8 border-t pt-6 space-y-6">

        <div class="bg-blue-50 p-5 rounded-xl border-l-4 border-blue-500">
            <h3 class="font-bold mb-2 text-blue-900">Vad betyder frågan?</h3>
            <p id="meaningText" class="text-blue-800"></p>
        </div>

        <div class="bg-green-50 p-5 rounded-xl border-l-4 border-green-500">
            <h3 class="font-bold mb-2 text-green-900">Viktiga begrepp</h3>
            <ul id="conceptsList" class="list-disc pl-5 text-green-800 space-y-1"></ul>
        </div>

        <div class="bg-amber-50 p-5 rounded-xl border-l-4 border-amber-500">
            <h3 class="font-bold mb-2 text-amber-900">Vad ska du göra nu?</h3>
            <ul id="nextList" class="list-disc pl-5 text-amber-800 space-y-1"></ul>
        </div>

    </div>

</section>

</main>

<script>

const HELP_DATA = [
    {
        keywords: ["presentera", "vilket land"],
        meaning: "Du ska kort berätta vilket land du valt.",
        concepts: [
            "Land är ett område med egna gränser och egen regering."
        ],
        next: [
            "Skriv landets namn.",
            "Skriv var det ligger i världen.",
            "Ge en kort introduktion."
        ]
    },
    {
        keywords: ["klimat", "klimatzon", "väder"],
        meaning: "Du ska förklara hur klimatet påverkar hur människor lever.",
        concepts: [
            "Klimat är hur vädret brukar vara under lång tid.",
            "Klimatzon är områden med liknande klimat."
        ],
        next: [
            "Ta reda på vilken klimatzon landet ligger i.",
            "Kolla temperatur och nederbörd.",
            "Fundera på hur det påverkar människor."
        ]
    },
    {
        keywords: ["endogena", "exogena", "jordbävning", "vulkan", "erosion"],
        meaning: "Du ska förklara hur naturkrafter påverkar människor.",
        concepts: [
            "Endogena krafter kommer från jordens inre, t.ex. vulkaner.",
            "Exogena krafter formar jordytan utifrån, t.ex. erosion."
        ],
        next: [
            "Ta reda på vilka krafter som finns i landet.",
            "Ge exempel.",
            "Beskriv hur det påverkar människor."
        ]
    },
    {
        keywords: ["befolkning", "bor människor", "gles", "tät"],
        meaning: "Du ska beskriva var människor bor och varför.",
        concepts: [
            "Befolkning är hur många människor som bor i ett område.",
            "Tätbefolkat betyder många människor på liten yta."
        ],
        next: [
            "Ta reda på var människor bor.",
            "Fundera på varför de bor där.",
            "Jämför med Sverige."
        ]
    },
    {
        keywords: ["naturresurser", "ekonomi"],
        meaning: "Du ska förklara hur natur och resurser påverkar landet.",
        concepts: [
            "Naturresurser är saker från naturen som människor använder.",
            "Ekonomi handlar om pengar och resurser."
        ],
        next: [
            "Ta reda på vilka resurser landet har.",
            "Beskriv hur de används.",
            "Koppla till hur landet fungerar."
        ]
    },
    {
        keywords: ["miljö", "hållbar", "miljöproblem"],
        meaning: "Du ska beskriva miljöproblem och lösningar.",
        concepts: [
            "Hållbar utveckling handlar om att ta hand om miljön.",
            "Miljöproblem är saker som skadar naturen."
        ],
        next: [
            "Ta reda på miljöproblem.",
            "Beskriv vad de leder till.",
            "Kolla hur landet försöker lösa dem."
        ]
    },
    {
        keywords: ["demokrati", "val", "lagar", "regering"],
        meaning: "Du ska förklara hur landet styrs.",
        concepts: [
            "Demokrati betyder att folket får vara med och bestämma.",
            "Regering styr landet."
        ],
        next: [
            "Ta reda på hur landet styrs.",
            "Jämför med Sverige.",
            "Beskriv vad det betyder för människor."
        ]
    },
    {
        keywords: ["vad påverkar mest"],
        meaning: "Du ska resonera kring vad som påverkar mest.",
        concepts: [
            "Resonera betyder att jämföra och tänka i flera steg."
        ],
        next: [
            "Jämför natur och politik.",
            "Ge exempel.",
            "Skriv vad du tycker och varför."
        ]
    }
];

function analyzeQuestion() {
    const input = document.getElementById("userQuestion").value.toLowerCase().trim();
    const error = document.getElementById("errorMessage");
    const card = document.getElementById("resultCard");

    if (input.length < 3) {
        error.classList.remove("hidden");
        card.classList.add("hidden");
        return;
    }

    error.classList.add("hidden");

    let match = HELP_DATA.find(item =>
        item.keywords.some(word => input.includes(word))
    );

    if (!match) {
        document.getElementById("meaningText").innerText =
            "Jag känner inte igen frågan riktigt ännu.";

        document.getElementById("conceptsList").innerHTML =
            "<li>Prova att klistra in hela frågan från ditt dokument.</li>";

        document.getElementById("nextList").innerHTML =
            "<li>Testa igen med en tydligare formulering eller kolla så att du stavat rätt.</li>";

        card.classList.remove("hidden");
        return;
    }

    document.getElementById("meaningText").innerText = match.meaning;

    document.getElementById("conceptsList").innerHTML =
        match.concepts.map(c => `<li>${c}</li>`).join("");

    document.getElementById("nextList").innerHTML =
        match.next.map(n => `<li>${n}</li>`).join("");

    card.classList.remove("hidden");
    
    // Scrolla ner till resultatet
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>

<script>

const HELP_DATA = [
  {
    keywords: ["test"],
    meaning: "Detta är ett test",
    concepts: ["Testbegrepp"],
    next: ["Teststeg"]
  }
];

function analyzeQuestion() {
  const input = document.getElementById("userQuestion").value.toLowerCase();
  const card = document.getElementById("resultCard");

  const match = HELP_DATA.find(item =>
    item.keywords.some(word => input.includes(word))
  );

  if (!match) {
    document.getElementById("meaningText").innerText =
      "Jag känner inte igen frågan riktigt ännu.";

    document.getElementById("conceptsList").innerHTML =
      "<li>Prova att klistra in hela frågan från ditt dokument.</li>";

    document.getElementById("nextList").innerHTML =
      "<li>Testa igen med en tydligare formulering.</li>";

    card.classList.remove("hidden");
    return;
  }

  document.getElementById("meaningText").innerText = match.meaning;

  document.getElementById("conceptsList").innerHTML =
    match.concepts.map(c => `<li>${c}</li>`).join("");

  document.getElementById("nextList").innerHTML =
    match.next.map(n => `<li>${n}</li>`).join("");

  card.classList.remove("hidden");

  card.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

</script>

</body>
</html>
