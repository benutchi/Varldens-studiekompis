<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studiehjälp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100">

  <header class="bg-blue-600 text-white py-8 px-4 text-center">
    <h1 class="text-4xl font-bold mb-2">Studiehjälp</h1>
    <p class="text-2xl italic">Världen, människan och makten</p>
  </header>

  <main class="max-w-4xl mx-auto p-6">
    <section class="bg-white rounded-2xl shadow p-6">
      <h2 class="text-3xl font-bold mb-4">Analysera din fråga</h2>

      <div class="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6">
        <p class="text-lg">
          Klistra in <strong>en rad i taget</strong> från arbetsdokumentet.
        </p>
      </div>

      <textarea
        id="userQuestion"
        rows="4"
        class="w-full border-2 border-gray-200 rounded-xl p-4 text-xl mb-4"
        placeholder="Klistra in en rad här..."
      ></textarea>

      <button
        id="analyzeBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl text-xl mb-6"
      >
        Hjälp mig förstå raden
      </button>

      <div
        id="resultCard"
        class="hidden mt-6 space-y-4"
      >
        <div class="bg-blue-50 rounded-xl p-4 border-l-4 border-blue-500">
          <h3 class="text-2xl font-bold mb-2">Vad betyder raden?</h3>
          <p id="meaningText" class="text-lg"></p>
        </div>

        <div class="bg-green-50 rounded-xl p-4 border-l-4 border-green-500">
          <h3 class="text-2xl font-bold mb-2">Viktiga begrepp</h3>
          <ul id="conceptsList" class="list-disc pl-6 text-lg space-y-1"></ul>
        </div>

        <div class="bg-amber-50 rounded-xl p-4 border-l-4 border-amber-500">
          <h3 class="text-2xl font-bold mb-2">Vad ska du göra nu?</h3>
          <ul id="nextList" class="list-disc pl-6 text-lg space-y-1"></ul>
        </div>
      </div>
    </section>
  </main>
<script src="help-data.js"></script>

<script>
function analyzeQuestion() {
  const input = document.getElementById("userQuestion").value.toLowerCase().trim();
  const resultCard = document.getElementById("resultCard");

  const meaningText = document.getElementById("meaningText");
  const conceptsList = document.getElementById("conceptsList");
  const nextList = document.getElementById("nextList");

  const match = HELP_DATA.find(item =>
    item.patterns.some(p => input.includes(p.toLowerCase()))
  );

  if (!match) {
    meaningText.textContent = "Jag känner inte igen frågan riktigt ännu.";
    conceptsList.innerHTML = "<li>Prova skriva hela raden.</li>";
    nextList.innerHTML = "<li>Testa igen.</li>";
    resultCard.classList.remove("hidden");
    return;
  }

  meaningText.textContent = match.meaning;
  conceptsList.innerHTML = match.concepts.map(c => `<li>${c}</li>`).join("");
  nextList.innerHTML = match.next.map(n => `<li>${n}</li>`).join("");

  resultCard.classList.remove("hidden");
}

document.getElementById("analyzeBtn").addEventListener("click", analyzeQuestion);

document.getElementById("userQuestion").addEventListener("keydown", function (e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    analyzeQuestion();
  }
});
</script>

</body>
</html>
