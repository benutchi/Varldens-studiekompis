<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studiehjälp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

  <div class="bg-blue-600 text-white p-6 text-center">
    <h1 class="text-3xl font-bold">Studiehjälp</h1>
    <p>Världen, människan och makten</p>
  </div>

  <div class="max-w-3xl mx-auto p-4">
    
    <h2 class="text-xl font-semibold mb-2">Analysera din fråga</h2>
    
    <textarea id="userQuestion" class="w-full p-3 border rounded mb-3" rows="4"></textarea>

    <button onclick="analyzeQuestion()" class="bg-blue-600 text-white px-4 py-2 rounded w-full">
      Hjälp mig förstå frågan
    </button>

    <div id="resultCard" class="mt-4 p-4 bg-white rounded shadow hidden">
      <h3 class="font-bold">Vad betyder frågan?</h3>
      <p id="meaningText"></p>

      <h3 class="font-bold mt-3">Viktiga begrepp</h3>
      <ul id="conceptsList"></ul>

      <h3 class="font-bold mt-3">Vad ska du göra nu?</h3>
      <ul id="nextList"></ul>
    </div>

  </div>

<script>

const HELP_DATA = [
  {
    keywords: ["test"],
    meaning: "Detta är ett test",
    concepts: ["Testbegrepp"],
    next: ["Teststeg"]
  }
];

function analyzeQuestion() {
  const input = document.getElementById("userQuestion").value.toLowerCase();
  const card = document.getElementById("resultCard");

  const match = HELP_DATA.find(item =>
    item.keywords.some(word => input.includes(word))
  );

  if (!match) {
    document.getElementById("meaningText").innerText =
      "Jag känner inte igen frågan ännu.";
    document.getElementById("conceptsList").innerHTML =
      "<li>Prova att skriva tydligare</li>";
    document.getElementById("nextList").innerHTML =
      "<li>Testa igen</li>";
    card.classList.remove("hidden");
    return;
  }

  document.getElementById("meaningText").innerText = match.meaning;
  document.getElementById("conceptsList").innerHTML =
    match.concepts.map(c => `<li>${c}</li>`).join("");
  document.getElementById("nextList").innerHTML =
    match.next.map(n => `<li>${n}</li>`).join("");

  card.classList.remove("hidden");
}

</script>

</body>
</html>
